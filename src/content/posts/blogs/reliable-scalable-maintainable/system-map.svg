  <text x="122" y="448" fill="#475569" font-family="Arial, sans-serif" font-size="22">设计重点：</text>
  <text x="122" y="488" fill="#334155" font-family="Arial, sans-serif" font-size="20">• 一致性如何维护</text>
  <text x="122" y="522" fill="#334155" font-family="Arial, sans-serif" font-size="20">• 故障如何隔离</text>
  <text x="122" y="556" fill="#334155" font-family="Arial, sans-serif" font-size="20">• 高负载如何分摊</text>
  <text x="122" y="590" fill="#334155" font-family="Arial, sans-serif" font-size="20">• 变更如何低风险演进</text>
