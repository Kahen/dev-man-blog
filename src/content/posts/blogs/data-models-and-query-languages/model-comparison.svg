  <text x="72" y="126" fill="#4B5563" font-family="Arial, sans-serif" font-size="20">当一份“用户档案”同时包含聚合字段、标准化实体和外部引用时，不同模型的重心会完全不同</text>

  <rect x="72" y="190" width="320" height="500" rx="24" fill="#F8FAFC" stroke="#CBD5E1"/>
