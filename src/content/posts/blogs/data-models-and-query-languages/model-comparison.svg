  <text x="137" y="435" fill="#3F6212" font-family="Arial, sans-serif" font-size="24">positions</text>
  <rect x="104" y="504" width="256" height="74" rx="16" fill="#FCE7F3"/>
  <text x="137" y="549" fill="#9D174D" font-family="Arial, sans-serif" font-size="24">education</text>
