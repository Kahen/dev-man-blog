  <path d="M232 464V504" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>

  <rect x="440" y="190" width="320" height="500" rx="24" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="548" y="236" fill="#9A3412" font-family="Arial, sans-serif" font-size="30" font-weight="700">文档模型</text>
  <rect x="482" y="278" width="236" height="330" rx="18" fill="#FFFFFF" stroke="#FED7AA"/>
  <text x="515" y="324" fill="#7C2D12" font-family="monospace" font-size="20">{</text>
  <text x="542" y="360" fill="#7C2D12" font-family="monospace" font-size="20">"user": {...},</text>
  <text x="542" y="396" fill="#7C2D12" font-family="monospace" font-size="20">"positions": [...],</text>
  <text x="542" y="432" fill="#7C2D12" font-family="monospace" font-size="20">"education": [...],</text>
  <text x="542" y="468" fill="#7C2D12" font-family="monospace" font-size="20">"contact": {...}</text>
  <text x="515" y="504" fill="#7C2D12" font-family="monospace" font-size="20">}</text>
  <text x="500" y="646" fill="#9A3412" font-family="Arial, sans-serif" font-size="18">整体读取自然，复杂关联较弱时更顺手</text>

  <rect x="808" y="190" width="320" height="500" rx="24" fill="#F0FDFA" stroke="#5EEAD4"/>
